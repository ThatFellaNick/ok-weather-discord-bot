services:
  ok-weather-bot:
    image: ${BOT_IMAGE:-thatfellanick/ok-weather-discord-bot:latest}
    build: ./app
    container_name: ok-weather-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-America/Chicago}
      POLL_SECONDS: ${POLL_SECONDS:-180}
      BRIEF_HOUR: ${BRIEF_HOUR:-9}
      BRIEF_MINUTE: ${BRIEF_MINUTE:-0}
      STATE_FILE: ${STATE_FILE:-/data/state.json}
      LOG_FILE: ${LOG_FILE:-/data/weather.log}
      TRIGGER_BRIEF_FILE: ${TRIGGER_BRIEF_FILE:-/data/trigger_brief}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.makedirs('/data', exist_ok=True); assert os.access('/data', os.W_OK)"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
